<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinkedIn Alert Bot — Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 20px 32px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .header .tag { background: #0077b5; color: white; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
  .stats-bar { display: flex; gap: 16px; padding: 24px 32px; }
  .stat { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px 24px; flex: 1; text-align: center; }
  .stat .num { font-size: 32px; font-weight: 800; }
  .stat .lbl { font-size: 12px; color: #94a3b8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .success .num { color: #4ade80; }
  .failed .num { color: #f87171; }
  .pending .num { color: #fbbf24; }
  .total .num { color: #60a5fa; }
  .content { padding: 0 32px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden; }
  .panel-header { padding: 14px 20px; background: #0f172a; border-bottom: 1px solid #334155; font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; display: flex; justify-content: space-between; align-items: center; }
  .panel-header span { background: #334155; color: #e2e8f0; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .location-block { border-bottom: 1px solid #1e293b; }
  .location-title { padding: 12px 20px 8px; font-size: 13px; font-weight: 700; color: #7dd3fc; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .location-title .loc-stats { margin-left: auto; display: flex; gap: 6px; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 600; }
  .b-done { background: #14532d; color: #4ade80; }
  .b-fail { background: #450a0a; color: #fca5a5; }
  .b-pend { background: #431407; color: #fbbf24; }
  .companies { padding: 0 20px 12px 32px; display: none; }
  .companies.open { display: block; }
  .company-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-success { background: #4ade80; }
  .dot-failed { background: #f87171; }
  .dot-pending { background: #fbbf24; }
  .dot-skipped { background: #475569; }
  .company-name { color: #cbd5e1; }
  .reason { color: #64748b; font-size: 11px; margin-left: auto; }
  .progress-wrap { padding: 6px 20px 14px; }
  .progress-bar { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #22d3ee); border-radius: 2px; transition: width 0.4s ease; }
  .progress-pct { font-size: 11px; color: #64748b; margin-top: 4px; }
  .log-panel { grid-column: 1 / -1; }
  .log-entries { max-height: 220px; overflow-y: auto; padding: 12px 20px; }
  .log-entry { font-size: 12px; font-family: 'Courier New', monospace; padding: 3px 0; border-bottom: 1px solid #0f172a; display: flex; gap: 12px; }
  .log-time { color: #475569; flex-shrink: 0; }
  .log-ok { color: #4ade80; }
  .log-err { color: #f87171; }
  .log-info { color: #94a3b8; }
  .log-warn { color: #fbbf24; }
  .toolbar { padding: 16px 32px; display: flex; gap: 10px; }
  .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-primary { background: #0077b5; color: white; }
  .btn-secondary { background: #334155; color: #e2e8f0; }
  .btn-danger { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  .cmd-box { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 16px 20px; margin: 0 32px 24px; font-family: monospace; font-size: 13px; color: #7dd3fc; }
  .cmd-box .cmd-line { padding: 3px 0; color: #94a3b8; }
  .cmd-box .cmd-line::before { content: "$ "; color: #4ade80; }
  .cmd-box .cmd-line.active { color: #f1f5f9; }
</style>
</head>
<body>

<div class="header">
  <div class="tag">LI</div>
  <h1>LinkedIn Job Alert Bot — Dashboard</h1>
  <div style="margin-left:auto;font-size:12px;color:#64748b;" id="last-run">Last run: Never</div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="simulateRun()">▶ Simulate Run</button>
  <button class="btn btn-secondary" onclick="expandAll()">Expand All</button>
  <button class="btn btn-secondary" onclick="collapseAll()">Collapse All</button>
  <button class="btn btn-danger" onclick="resetAll()">↺ Reset State</button>
</div>

<div class="stats-bar">
  <div class="stat total"><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
  <div class="stat success"><div class="num" id="s-success">0</div><div class="lbl">Success</div></div>
  <div class="stat failed"><div class="num" id="s-failed">0</div><div class="lbl">Failed</div></div>
  <div class="stat pending"><div class="num" id="s-pending">0</div><div class="lbl">Pending</div></div>
</div>

<div class="cmd-box">
  <div class="cmd-line">python main.py --dry-run</div>
  <div class="cmd-line active" id="active-cmd">python main.py</div>
  <div class="cmd-line">python main.py --retry-failed</div>
  <div class="cmd-line">python main.py --status</div>
</div>

<div class="content" id="locations-grid"></div>

<div style="padding: 0 32px 32px;">
  <div class="panel log-panel">
    <div class="panel-header">Run Log <span id="log-count">0 entries</span></div>
    <div class="log-entries" id="log-entries"></div>
  </div>
</div>

<script>
const DATA = {
  "London, UK": ["Google","Amazon","Apple","Meta","Microsoft","Bloomberg","Citadel","Spotify","Snapchat","ByteDance","Yelp","Vercel","Bulb","Mobiquity","Expensify","Free Now","Marks & Spencer","EF Education First","Contentful","Canva","Intercom","The LEGO Group","Plaid","TransferWise","Palantir","Algolia","Revolut","PayFit","SumUp","Trainline","Deliveroo","Collibra","HashiCorp","OneFootball","Barclays","Skyscanner","GoCardless","DRW"],
  "Berlin, Germany": ["Amazon","Google","Zalando","Ubisoft","Klarna","Delivery Hero","Adnymics","Hive.app","N26","Signavio","Wayfair","Free Now","Trivago","Babbel","Personio","RapidAPI","HelloFresh","PayFit","SumUp","Taxfix","Blinkist","SoundCloud","Pitch","Qonto","Gorillas","HashiCorp","Project44","TradeRepublic","Immobilienscout24","Clark","Forto","Raisin","InVision","Tipico","Container xChange","Sunday","Celus","Civey GmbH","Back Market","NavVis","e-bot7","Bigpoint","Fashion Cloud","Flaconi","OneFootball","Jam City","Mister Spex","Getir","Capmo","Project Plato","Contentful"],
  "Amsterdam, NL": ["Databricks","Uber","Optiver","Vercel","Booking.com","Mobiquity","Miro","Plaid","SumUp","Gorillas","HashiCorp","Fashion Cloud","Reaktor","Evalan","Picnic Technologies","Adidas","Project Plato"],
  "Dublin, Ireland": ["Microsoft","Amazon","Vercel","Verizon Connect","Free Now","Intercom","Meta","Squarespace","Datadog","Etsy","Contentful"],
  "Singapore": ["ByteDance","Shopee","Grab","Gojek","Ninja Van","Foodpanda","Zendesk","Circles.Life"],
  "Canada": ["Amazon","Meta","Microsoft","Google","Capital One","Square","Shopify"],
  "Paris, France": ["BlaBlaCar","Getaround","Datadog","Deezer"],
  "Japan": ["Mercari","Fast Retailing","Line Corporation"],
  "Spain": ["Amazon","Taxfix","Blinkist","Kiwi.com","Skyscanner"],
  "Estonia": ["Bolt","TransferWise"],
  "Stockholm, Sweden": ["Spotify","Diet Doctor"],
  "Warsaw, Poland": ["Google","Glovo"],
  "Other": ["Luxembourg: Amazon","Glasgow: JPMC","Zurich: EF Education First","Riga: Swisscom","Italy: Bending Spoons","Italy: Amazon","Austria: Agentur Loop","Bangkok: Agoda","South Africa: Amazon"]
};

let state = {};
let logs = [];

function initState() {
  state = {};
  Object.entries(DATA).forEach(([loc, companies]) => {
    companies.forEach(c => {
      state[`${c}::${loc}`] = "pending";
    });
  });
}

function addLog(msg, type = "info") {
  const now = new Date().toLocaleTimeString();
  logs.unshift({ time: now, msg, type });
  renderLogs();
}

function renderLogs() {
  const el = document.getElementById("log-entries");
  document.getElementById("log-count").textContent = `${logs.length} entries`;
  el.innerHTML = logs.slice(0, 80).map(l =>
    `<div class="log-entry"><span class="log-time">${l.time}</span><span class="log-${l.type}">${l.msg}</span></div>`
  ).join("");
}

function updateStats() {
  const vals = Object.values(state);
  const total = vals.length;
  const success = vals.filter(v => v === "success").length;
  const failed = vals.filter(v => v === "failed").length;
  const pending = vals.filter(v => v === "pending").length;
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-success").textContent = success;
  document.getElementById("s-failed").textContent = failed;
  document.getElementById("s-pending").textContent = pending;
}

function renderGrid() {
  const grid = document.getElementById("locations-grid");
  grid.innerHTML = Object.entries(DATA).map(([loc, companies]) => {
    const done = companies.filter(c => state[`${c}::${loc}`] === "success").length;
    const fail = companies.filter(c => state[`${c}::${loc}`] === "failed").length;
    const pend = companies.filter(c => state[`${c}::${loc}`] === "pending").length;
    const pct = Math.round((done / companies.length) * 100);

    const rows = companies.map(c => {
      const s = state[`${c}::${loc}`] || "pending";
      return `<div class="company-row">
        <div class="dot dot-${s}"></div>
        <span class="company-name">${c}</span>
        ${s === "failed" ? '<span class="reason">Timeout / DOM changed</span>' : ""}
      </div>`;
    }).join("");

    return `<div class="panel">
      <div class="panel-header">${loc} <span>${companies.length} companies</span></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-pct">${pct}% complete</div>
      </div>
      <div class="location-block">
        <div class="location-title" onclick="toggleSection(this)">
          Companies
          <div class="loc-stats">
            ${done ? `<span class="badge b-done">${done} done</span>` : ""}
            ${fail ? `<span class="badge b-fail">${fail} failed</span>` : ""}
            ${pend ? `<span class="badge b-pend">${pend} pending</span>` : ""}
          </div>
        </div>
        <div class="companies">${rows}</div>
      </div>
    </div>`;
  }).join("");
}

function toggleSection(el) {
  el.nextElementSibling.classList.toggle("open");
}
function expandAll() {
  document.querySelectorAll(".companies").forEach(e => e.classList.add("open"));
}
function collapseAll() {
  document.querySelectorAll(".companies").forEach(e => e.classList.remove("open"));
}

function resetAll() {
  initState();
  logs = [];
  renderGrid();
  renderLogs();
  updateStats();
  document.getElementById("last-run").textContent = "Last run: Never";
  addLog("State reset. All companies marked as pending.", "warn");
}

async function simulateRun() {
  const allKeys = Object.keys(state).filter(k => state[k] === "pending");
  if (allKeys.length === 0) {
    addLog("Nothing to process — all alerts already set. Run reset to retry.", "warn");
    return;
  }
  addLog(`Starting run: ${allKeys.length} pending alerts to set...`, "info");
  document.getElementById("last-run").textContent = `Last run: ${new Date().toLocaleTimeString()}`;

  for (let i = 0; i < allKeys.length; i++) {
    const key = allKeys[i];
    const [company, loc] = key.split("::");
    const success = Math.random() > 0.12; // ~88% success rate simulation
    state[key] = success ? "success" : "failed";
    addLog(
      success ? `✓ Alert set: ${company} (${loc})` : `✗ Failed: ${company} (${loc})`,
      success ? "ok" : "err"
    );
    updateStats();
    renderGrid();
    await new Promise(r => setTimeout(r, 60));
  }

  const s = Object.values(state).filter(v => v === "success").length;
  const f = Object.values(state).filter(v => v === "failed").length;
  addLog(`Run complete — ${s} success, ${f} failed.`, "info");
}

// Init
initState();
renderGrid();
updateStats();
addLog("Dashboard loaded. Click ▶ Simulate Run to preview execution.", "info");
</script>
</body>
</html>
